version: "3.9"

services:
  app:
    build: .

    ports:
      - "3000:3000"

    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/koinx-reconciliation
      TIMESTAMP_TOLERANCE_SECONDS: 300
      QUANTITY_TOLERANCE_PCT: 0.01

    depends_on:
      - mongo

  mongo:
    image: mongo:7

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: